  const wh = ["What","Where","When","Who","Whose","Which","Why","How"];
  WORDS.forEach((w,idx)=>{

}
enrichExamples();

const MODES = [
  ["quiz","単語テスト","日本語4択だけ"],
  ["sentence","例文で確認","英語例文つき4択"],
  ["review","苦手復習","間違えた語だけ"],
  ["lv1","Lv1","5級基礎"],
  ["lv2","Lv2","4級橋渡し"],
  ["lv3","Lv3","3級準備"],
  ["card","暗記カード","意味と例文で覚える"]
];
let st = {mode:"quiz", i:0, list:[...WORDS], ok:0, total:0, wrong:{}, status:{}, hist:[], auto:true, showJp:true, currentChoices:null, retrying:false, attempts:0};
function $(id){return document.getElementById(id)}
function save(){localStorage.setItem("eiken_vocab500_wrong", JSON.stringify(st.wrong));localStorage.setItem("eiken_vocab500_status", JSON.stringify(st.status));}
function load(){try{st.wrong=JSON.parse(localStorage.getItem("eiken_vocab500_wrong")||"{}")}catch(e){st.wrong={}}try{st.status=JSON.parse(localStorage.getItem("eiken_vocab500_status")||"{}")}catch(e){st.status={}}}
function sh(a){return [...a].sort(()=>Math.random()-.5)}
function listFor(m){if(m==="review")return Object.values(st.wrong);if(m==="lv1")return WORDS.filter(w=>w.lv===1);if(m==="lv2")return WORDS.filter(w=>w.lv===2);if(m==="lv3")return WORDS.filter(w=>w.lv===3);return [...WORDS];}
function renderModes(){$("modes").innerHTML=MODES.map(m=>`<button class="mode ${st.mode===m[0]?'on':''}" onclick="setMode('${m[0]}')">${m[1]}<small>${m[2]}</small></button>`).join("");}
function setMode(m){st.mode=m;st.i=0;st.list=listFor(m);st.currentChoices=null;renderModes();render();}
function shuffleMode(){st.list=sh(st.list);st.i=0;render();}
function toggleAuto(){st.auto=!st.auto;$("autoBtn").textContent=st.auto?"音声ON":"音声OFF";$("autoBtn").className=st.auto?"on":"";}
function toggleJp(){st.showJp=!st.showJp;render();}
function getEnglishVoices(){
  let vs = speechSynthesis.getVoices().filter(v=>/^en/.test(v.lang||""));
  let us = vs.filter(v=>(v.lang||"").toLowerCase().startsWith("en-us"));
  return us.length ? us : vs;
}
function makeUtterance(text, role, onend=null){
  let u = new SpeechSynthesisUtterance(text);
  u.lang = "en-US";
  let vs = getEnglishVoices();
  // 質問はやや高め・ゆっくり、回答は少し低め・自然に。
  if(role==="q"){
    u.rate = .82; u.pitch = 1.18;
    if(vs[0]) u.voice = vs[0];
  }else{
    u.rate = .9; u.pitch = .92;
    if(vs[1]) u.voice = vs[1];
    else if(vs[0]) u.voice = vs[0];
  }
  if(onend) u.onend = onend;
  return u;
}
function speak(text,onend=null){
  if(!("speechSynthesis" in window))return;
  if(!text)return;
  speechSynthesis.cancel();
  speechSynthesis.speak(makeUtterance(text,"q",onend));
}
function speakQA(text,onend=null){
  if(!("speechSynthesis" in window))return;
  if(!text)return;
  speechSynthesis.cancel();
  let parts = text.split(/(?<=[?])\s+/);
  if(parts.length>=2){
    let q = parts[0];
    let a = parts.slice(1).join(" ");
    let uq = makeUtterance(q,"q",()=>setTimeout(()=>speechSynthesis.speak(makeUtterance(a,"a",onend)),250));
    speechSynthesis.speak(uq);
  }else{
    speechSynthesis.speak(makeUtterance(text,"q",onend));
  }
}

function splitQA(en, jp){
  let enParts = en.split(/(?<=[?])\s+/);
  let jpParts = jp.split(/(?<=[か。？])\s*/).filter(Boolean);
  if(enParts.length>=2){
    return {
      q: enParts[0].trim(),
      a: enParts.slice(1).join(" ").trim(),
      qjp: (jpParts[0]||"").trim(),
      ajp: (jpParts.slice(1).join("")||"").trim()
    };
  }
  return {q: en.trim(), a:"", qjp: jp.trim(), ajp:""};
}
function qaHTML(w, blank=false){
  let en = blank ? w.ex.replaceAll(w.e, "_____") : w.ex;
  let p = splitQA(en, w.jpex);
  if(p.a){
    return `<div class="qaBox">
      <span class="q">Q. ${p.q}<span class="jp">/ ${p.qjp}</span></span>
      <span class="a">A. ${p.a}<span class="jp">/ ${p.ajp}</span></span>
    </div>`;
  }
  return `<div class="qaBox"><span class="q">${p.q}<span class="jp">/ ${p.qjp}</span></span></div>`;
}
function qaFeedback(w, head){
  let p = splitQA(w.ex, w.jpex);
  if(p.a){
    return `${head}<br>
      <span class="qaLine">Q. ${p.q}<span class="qaJp">/ ${p.qjp}</span></span>
      <span class="qaLine">A. ${p.a}<span class="qaJp">/ ${p.ajp}</span></span>`;
  }
  return `${head}<br><span class="qaLine">${p.q}<span class="qaJp">/ ${p.qjp}</span></span>`;
}

function speakCurrent(){let w=st.list[st.i];if(w)speakQA(w.e+". "+w.ex);}
function makeChoices(w){
  // 正解が必ず入るように固定。重複も除去。
  let pool = [...new Set(WORDS.filter(x=>x.j!==w.j).map(x=>x.j))];
  let arr = sh(pool).slice(0,3);
  arr.push(w.j);
  return sh(arr);
}
function next(){if(st.i<st.list.length-1)st.i++;else st.i=0;st.currentChoices=null;st.retrying=false;st.attempts=0;render();}
function prev(){if(st.i>0)st.i--;st.currentChoices=null;st.retrying=false;st.attempts=0;render();}
function wordIndex(w){return WORDS.findIndex(x=>x.id===w.id);}
function jumpWord(n){st.mode="quiz";st.list=[...WORDS];st.i=n-1;st.currentChoices=null;st.retrying=false;st.attempts=0;renderModes();render();}
function stat(){let r=st.total?Math.round(st.ok/st.total*100):0;$("ok").textContent=st.ok;$("rate").textContent=r+"%";$("wrong").textContent=Object.keys(st.wrong).length;$("prog").textContent=st.list.length?`${st.i+1}/${st.list.length}`:"0/0";$("bar").style.width=st.list.length?((st.i+1)/st.list.length*100)+"%":"0%";$("barText").textContent=st.list.length?`${st.i+1} / ${st.list.length}`:"0 / 0";
$("hist").innerHTML=st.hist.length?st.hist.map(h=>`<div class="item"><span>#${h.no} ${h.e}</span><span>${h.ok?'⭕':'❌'} ${h.j}</span></div>`).join(""):`<div class="item"><span>まだ記録なし</span><span>—</span></div>`;
let wl=Object.values(st.wrong).slice(0,20);$("wrongList").innerHTML=wl.length?wl.map(w=>{let no=wordIndex(w)+1;return `<div class="item"><span>#${no} ${w.e}</span><span>${w.j}</span></div>`}).join(""):`<div class="item"><span>まだなし</span><span>👍</span></div>`;
let cur=st.list[st.i]?wordIndex(st.list[st.i])+1:0;
$("numGrid").innerHTML=WORDS.map((w,idx)=>{let no=idx+1;let s=st.status[w.id]||"";let label={"ok1":"1回正解","ok2":"2回で正解","ok3":"3回で正解","ok4":"4回以上で正解","ng":"未正解・不正解"}[s]||"未実施";return `<button class="num ${s} ${no===cur?'now':''}" title="#${no} ${w.e}：${label}" onclick="jumpWord(${no})">${no}</button>`}).join("");
}
function render(){let w=st.list[st.i];$("feedback").textContent="";$("feedback").className="feedback";let mn=MODES.find(m=>m[0]===st.mode);$("modeName").textContent=mn?mn[1]:"";if(!w){$("main").innerHTML="<h2>苦手はまだありません</h2><p>単語テストで間違えるとここに入ります。</p>";stat();return;}stat();if(st.auto)setTimeout(()=>speak(w.e),120);
if(st.mode==="card"||st.mode.startsWith("lv")){$("main").innerHTML=`<div class="tag">Lv${w.lv} / ${w.cat}</div><div class="word">${w.e}</div><div class="meaning">${w.j}</div>${st.showJp?qaHTML(w,false):`<div class="example">${w.ex}</div>`}<div class="row"><button onclick="mark(false)">まだ覚えてない</button><button class="on" onclick="mark(true)">覚えた</button></div>`;return;}
if(!st.currentChoices || !st.currentChoices.includes(w.j))st.currentChoices=makeChoices(w);
let title=st.mode==="sentence"?"例文を読んで、単語の意味を選ぼう":"英単語の意味を選ぼう";
let safeEx = w.ex.replaceAll(w.e, "_____");
let ex = "";
if(st.mode==="sentence"){
  ex = qaHTML({...w, ex:safeEx, jpex:"日本語訳は回答後に表示"}, false);
}
$("main").innerHTML=`<div class="tag">Lv${w.lv} / ${w.cat}</div><h2>${title}</h2><div class="word">${w.e}</div>${ex}<div>${st.currentChoices.map(c=>`<button class="choice" onclick="answer('${encodeURIComponent(c)}', this)">${c}</button>`).join("")}</div>`;}
function mark(ok){let w=st.list[st.i];let no=wordIndex(w)+1;if(ok){delete st.wrong[w.id];st.status[w.id]="ok1";speakQA(w.ex);}else{st.wrong[w.id]=w;st.status[w.id]="ng";}st.hist.unshift({no,e:w.e,j:w.j,ok});st.hist=st.hist.slice(0,5);save();next();}
function answer(enc, el){
  let c=decodeURIComponent(enc), w=st.list[st.i];
  if(![...document.querySelectorAll(".choice")].some(b=>b.textContent===w.j)){
    st.currentChoices = makeChoices(w);
    render();
    $("feedback").innerHTML="ごめん、正解選択肢が抜けていたので出し直しました。もう一回選んで！";
    $("feedback").className="feedback fbad";
    return;
  }
  st.attempts++;
  let ok=c===w.j;
  if(ok){
    if(!st.retrying){st.total++;st.ok++;}
    delete st.wrong[w.id];
    let attemptClass = st.attempts<=1 ? "ok1" : (st.attempts===2 ? "ok2" : (st.attempts===3 ? "ok3" : "ok4"));
    st.status[w.id]=attemptClass;
    el.classList.add("good");
    [...document.querySelectorAll(".choice")].forEach(b=>{b.disabled=true;if(b.textContent===w.j)b.classList.add("good");});
    $("feedback").innerHTML=qaFeedback(w,"せいかい！ "+w.e+" = "+w.j+"（"+st.attempts+"回目）");
    $("feedback").className="feedback fgood";
    st.hist.unshift({no:wordIndex(w)+1,e:w.e,j:w.j,ok:true});st.hist=st.hist.slice(0,5);
    save();stat();
    // 正解後に例文を読み上げてから次へ
    speakQA(w.ex, ()=>setTimeout(next,700));
  }else{
    if(!st.retrying){st.total++; st.retrying=true; st.hist.unshift({no:wordIndex(w)+1,e:w.e,j:w.j,ok:false}); st.hist=st.hist.slice(0,5);}
    st.wrong[w.id]=w;
    st.status[w.id]="ng";
    el.classList.add("bad");
    el.disabled=true;
    $("feedback").innerHTML="おしい。もう一回選んで！";
    $("feedback").className="feedback fbad";
    save();stat();
  }
}
function showAnswer(){let w=st.list[st.i];if(!w)return;$("feedback").innerHTML=qaFeedback(w,`${w.e} = ${w.j}`);$("feedback").className="feedback fbad";st.wrong[w.id]=w;st.status[w.id]="ok4";[...document.querySelectorAll(".choice")].forEach(b=>{if(b.textContent===w.j)b.classList.add("good");});save();stat();speakQA(w.ex);}

function resetAll(){
  if(!confirm("正解・不正解・苦手リスト・履歴をすべてリセットします。よろしいですか？")) return;
  st.ok=0; st.total=0; st.wrong={}; st.status={}; st.hist=[]; st.currentChoices=null; st.retrying=false; st.attempts=0;
  localStorage.removeItem("eiken_vocab500_wrong");
  localStorage.removeItem("eiken_vocab500_status");
  save();
  render();
}

if("speechSynthesis" in window){speechSynthesis.onvoiceschanged=()=>{};speechSynthesis.getVoices();}
load();renderModes();render();
